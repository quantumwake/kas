name: ci

on:
  push:
    branches: [main, v3]
  pull_request:

jobs:
  check:
    # CPU-only: the characterization suite runs without model weights or a GPU,
    # so CI needs no Apple-silicon runner. (MLX-bound code stays untested here.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync (dev extra)
        run: uv sync --extra dev

      - name: Lint (ruff check + format)  # BLOCKING gate
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy)  # informational until the per-phase ratchet (docs/v3/PLAN.md)
        run: uv run mypy --config-file pyproject.toml agent/ server/ || true

      - name: Tests + coverage  # BLOCKING gate
        run: uv run pytest --cov=agent --cov=server --cov-report=term-missing:skip-covered
